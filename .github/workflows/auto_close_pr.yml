name: Auto Close PR on Label

on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write

jobs:
  close-pr:
    name: Close PR if blocking label added
    runs-on: ubuntu-latest
    steps:
      - name: Close PR if label matches
        uses: actions/github-script@v7
        with:
          script: |
            const BLOCKING_LABELS = ['invalid', 'help wanted', 'wontfix', 'duplicate']
            const addedLabel = context.payload.label.name

            if (!BLOCKING_LABELS.includes(addedLabel)) {
              console.log(`Label '${addedLabel}' is not a blocking label, skipping.`)
              return
            }

            console.log(`Label '${addedLabel}' is a blocking label, closing PR...`)

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed'
            })

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `This PR was automatically closed because the label **'${addedLabel}'** was applied.`
            })