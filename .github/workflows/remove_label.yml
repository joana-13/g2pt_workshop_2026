name: Auto Unlabel PR

on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_target:
    types: [closed]

permissions:
  pull-requests: write
  issues: write

jobs:
  remove-label-on-close:
    name: Remove 'ready for review' label on close
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Remove label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'ready for review'
              })
              console.log('PR closed — label removed.')
            } catch (e) {
              if (e.status === 404) {
                console.log('Label was not present, skipping.')
              } else {
                throw e
              }
            }