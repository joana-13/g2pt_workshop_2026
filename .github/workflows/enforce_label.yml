name: Auto Label PR

on:
  workflow_run:
    workflows:
      - "Validate Branch Name"
      - "Validate Commit Messages"
    types:
      - completed

permissions:
  pull-requests: write
  issues: write

jobs:
  add-label:
    name: Add 'ready for review' label
    if: github.event.workflow_run.conclusion == 'success' && (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Add label
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`
            })

            if (prs.data.length === 0) {
              console.log('No open PR found for this branch, skipping.')
              return
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prs.data[0].number,
              labels: ['ready for review']
            })

  remove-label:
    name: Remove 'ready for review' label
    if: github.event.workflow_run.conclusion != 'success' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove label
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`
            })

            if (prs.data.length === 0) {
              console.log('No open PR found for this branch, skipping.')
              return
            }

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number,
                name: 'ready for review'
              })
            } catch (e) {
              if (e.status === 404) {
                console.log('Label was not present, skipping.')
              } else {
                throw e
              }
            }

  add-label-m:
    name: Add 'merged' label
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Add label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['merged']
            })